name: Build and deploy to Azure Web App - data-validator

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: data-validator
  NODE_VERSION: 20.x
  PYTHON_VERSION: "3.12"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install backend dependencies and run tests
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pytest backend/tests/ -q
          PYTHONPATH=backend python - <<'PY'
          import asyncio

          from app.main import app, health

          async def smoke() -> None:
              async with app.router.lifespan_context(app):
                  assert health()["status"] == "ok"

          asyncio.run(smoke())
          PY
          pip install --target "python_packages/lib/site-packages" -r backend/requirements.txt

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: app
          include-hidden-files: true
          path: |
            .
            !.git/
            !.env
            !.idea/
            !.python_packages/
            !.pytest_cache/
            !.venv/
            !frontend/node_modules/
            !frontend/.npm-cache/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE || secrets.AZUREAPPSERVICE_PUBLISHPROFILE_6D530A8F62404424B0A65319AD61C59C }}
