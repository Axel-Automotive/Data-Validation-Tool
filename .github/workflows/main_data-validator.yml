name: Build and deploy to Azure Web App - data-validator

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: data-validator
  AZURE_WEBAPP_URL: https://data-validator-gdcvhndea2ftb3he.westcentralus-01.azurewebsites.net
  NODE_VERSION: 20.x
  PYTHON_VERSION: "3.12"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install backend dependencies and run tests
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pytest backend/tests/ -q
          PYTHONPATH=backend python - <<'PY'
          import asyncio

          from app.main import app, health

          async def smoke() -> None:
              async with app.router.lifespan_context(app):
                  assert health()["status"] == "ok"

          asyncio.run(smoke())
          PY
          pip install --target "python_packages/lib/site-packages" -r backend/requirements.txt

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: app
          include-hidden-files: true
          path: |
            .
            !.git/
            !.env
            !.idea/
            !.python_packages/
            !.pytest_cache/
            !.venv/
            !frontend/node_modules/
            !frontend/.npm-cache/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE || secrets.AZUREAPPSERVICE_PUBLISHPROFILE_6D530A8F62404424B0A65319AD61C59C }}

      - name: Prepare Kudu credentials
        shell: bash
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE || secrets.AZUREAPPSERVICE_PUBLISHPROFILE_6D530A8F62404424B0A65319AD61C59C }}
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          root = ET.fromstring(os.environ["PUBLISH_PROFILE"])
          profiles = root.findall(".//publishProfile")
          profile = next(
              (p for p in profiles if p.attrib.get("publishMethod") == "ZipDeploy"),
              profiles[0],
          )
          host = profile.attrib["publishUrl"].split(":")[0]
          password = profile.attrib["userPWD"]
          print(f"::add-mask::{password}")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
              env.write(f"KUDU_HOST={host}\n")
              env.write(f"KUDU_USER={profile.attrib['userName']}\n")
              env.write(f"KUDU_PASS={password}\n")
          PY

      - name: Smoke test deployed app
        shell: bash
        run: |
          for attempt in {1..12}; do
            body="$(mktemp)"
            code="$(curl -k -sS -m 15 -o "$body" -w "%{http_code}" "$AZURE_WEBAPP_URL/health" || true)"
            echo "Attempt $attempt: HTTP $code"
            cat "$body"
            echo
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Print Kudu diagnostics
        if: failure()
        shell: bash
        run: |
          echo "::group::Docker logs"
          docker_index="$(curl -sS -u "$KUDU_USER:$KUDU_PASS" "https://$KUDU_HOST/api/logs/docker" || true)"
          echo "$docker_index"
          while IFS= read -r href; do
            [ -n "$href" ] || continue
            echo
            echo "---- $href ----"
            curl -sS -u "$KUDU_USER:$KUDU_PASS" "$href" | tail -n 220 || true
          done < <(
            DOCKER_INDEX="$docker_index" python - <<'PY'
          import json
          import os

          try:
              entries = json.loads(os.environ["DOCKER_INDEX"])
          except Exception:
              entries = []
          for entry in entries:
              path = entry.get("path", "")
              if "_scm_" not in path:
                  print(entry.get("href", ""))
          PY
          )
          echo "::endgroup::"

          echo "::group::Startup log"
          curl -sS -u "$KUDU_USER:$KUDU_PASS" "https://$KUDU_HOST/api/vfs/LogFiles/startup.log" || true
          echo "::endgroup::"

          echo "::group::Kudu command diagnostics"
          payload="$(python - <<'PY'
          import json
          import shlex

          script = r'''
          set -e
          echo "wwwroot:"
          ls -la /home/site/wwwroot
          echo
          echo "python_packages:"
          ls -la /home/site/wwwroot/python_packages/lib/site-packages 2>/dev/null | sed -n '1,60p' || true
          echo
          echo "selected env:"
          printenv | sort | grep -E '^(PORT|WEBSITES_PORT|WEBSITE_SITE_NAME|PYTHONPATH|VIRTUAL_ENV|SCM_DO_BUILD_DURING_DEPLOYMENT|ENABLE_ORYX_BUILD)=' || true
          '''
          command = "bash -lc " + shlex.quote(script)
          print(json.dumps({"command": command, "dir": "/home/site/wwwroot"}))
          PY
          )"
          curl -sS -u "$KUDU_USER:$KUDU_PASS" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "https://$KUDU_HOST/api/command" || true
          echo "::endgroup::"
